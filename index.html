<style>
/* ===========================================================
   APEX ROOFING SOLUTIONS — STYLES
   Design tokens:
   --ink        #0B0D0F   deep charcoal base
   --panel      #15181C   panel charcoal
   --panel-2    #1B1F24   lighter panel
   --paper      #F5F3EF   warm off-white
   --gold       #E8A23D   burnished gold (primary accent)
   --gold-deep  #C8881F   bronze-gold (gradient end / hover)
   --bronze     #8B5A1F   deep bronze (shadows/borders)
   --grey       #9CA3AB   cool muted text on dark
   Type: Fraunces (display) + Inter (body/UI)
=========================================================== */

:root{
  --ink: #0B0D0F;
  --panel: #15181C;
  --panel-2: #1B1F24;
  --panel-border: rgba(232,162,61,0.14);
  --paper: #F5F3EF;
  --paper-dim: #C9C6C0;
  --gold: #E8A23D;
  --gold-deep: #C8881F;
  --gold-soft: #F2C172;
  --bronze: #8B5A1F;
  --grey: #9CA3AB;
  --grey-dim: #6b7178;

  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --container: 1180px;
  --radius: 14px;
  --ease: cubic-bezier(.22,1,.36,1);
  --ease-out-strong: cubic-bezier(.16,1,.3,1);

  --shadow-lift: 0 20px 50px -20px rgba(0,0,0,0.55);
  --shadow-gold: 0 10px 30px -8px rgba(232,162,61,0.35);
}

/* ============ RESET ============ */
*,*::before,*::after{ box-sizing: border-box; }
html{ scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior: auto; }
  *,*::before,*::after{ animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
}
body{
  margin:0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; margin:0; padding:0; }
h1,h2,h3,h4,p{ margin:0; }
button{ font-family:inherit; cursor:pointer; }
.container{ max-width: var(--container); margin: 0 auto; padding: 0 24px; }

/* visible keyboard focus everywhere */
a:focus-visible, button:focus-visible, input:focus-visible{
  outline: 2px solid var(--gold);
  outline-offset: 3px;
  border-radius: 4px;
}

.skip-link{
  position:absolute; left:-9999px; top:0;
  background: var(--gold); color: var(--ink);
  padding: 10px 18px; font-weight:700; z-index: 999;
}
.skip-link:focus{ left: 12px; top: 12px; }

/* ============ TYPE HELPERS ============ */
.text-accent{
  background: linear-gradient(100deg, var(--gold-soft), var(--gold-deep));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-family: var(--font-body); font-weight:700; font-size: 13px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
}
.eyebrow-dot{ width:7px; height:7px; border-radius:50%; background: var(--gold); box-shadow: 0 0 0 4px rgba(232,162,61,.18); }
.eyebrow-dark{ color: var(--gold-deep); }
.eyebrow-dark .eyebrow-dot{ background: var(--gold-deep); }

.section-title{
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2rem, 4.2vw, 3.1rem);
  line-height: 1.12;
  letter-spacing: -0.01em;
  color: var(--paper);
  max-width: 720px;
}
.why .section-title, .reviews .section-title, .faq .section-title{ color: var(--ink); }
.section-sub{
  margin-top: 18px;
  font-size: 1.05rem;
  color: var(--grey);
  max-width: 560px;
  line-height: 1.7;
}
.why .section-sub, .reviews .section-sub, .faq .section-sub{ color: var(--grey-dim); }
.section-head{ margin-bottom: 56px; }

/* ============ REVEAL ANIMATION ============ */
.reveal{
  opacity: 0;
  transform: translateY(26px);
  transition: opacity .8s var(--ease-out-strong), transform .8s var(--ease-out-strong);
}
.reveal.is-visible{ opacity: 1; transform: translateY(0); }
@media (prefers-reduced-motion: reduce){
  .reveal{ opacity:1; transform:none; transition:none; }
}

/* ============ BUTTONS ============ */
.btn{
  display: inline-flex; align-items: center; justify-content:center; gap: 10px;
  font-family: var(--font-body); font-weight: 700; font-size: 0.95rem;
  padding: 14px 26px; border-radius: 999px;
  border: 1px solid transparent;
  white-space: nowrap;
  transition: transform .35s var(--ease), box-shadow .35s var(--ease), background .35s var(--ease), border-color .35s var(--ease), color .35s var(--ease);
  will-change: transform;
}
.btn svg{ flex-shrink:0; }
.btn-primary{
  background: linear-gradient(135deg, var(--gold-soft), var(--gold-deep));
  color: var(--ink);
  box-shadow: var(--shadow-gold);
}
.btn-primary:hover{ transform: translateY(-3px) scale(1.02); box-shadow: 0 16px 36px -10px rgba(232,162,61,.5); }
.btn-ghost{
  background: rgba(255,255,255,0.04);
  border-color: rgba(245,243,239,0.25);
  color: var(--paper);
  backdrop-filter: blur(6px);
}
.btn-ghost:hover{ background: rgba(255,255,255,0.1); border-color: rgba(245,243,239,0.45); transform: translateY(-3px); }
.btn-outline-light{
  background: transparent; border-color: rgba(245,243,239,0.4); color: var(--paper);
}
.btn-outline-light:hover{ background: rgba(245,243,239,0.1); transform: translateY(-3px); }
.btn-call{
  background: var(--panel-2); color: var(--gold); border: 1px solid var(--panel-border);
  padding: 11px 20px; font-size: .9rem;
}
.btn-call:hover{ background: rgba(232,162,61,0.12); transform: translateY(-2px); }
.btn-whatsapp{
  background: #1F2A24; color: #5fd068; border: 1px solid rgba(95,208,104,0.3);
}
.btn-whatsapp:hover{ background: rgba(95,208,104,0.16); transform: translateY(-3px); }
.btn-lg{ padding: 17px 32px; font-size: 1rem; }
.btn-block{ width:100%; }

/* ============ NAVIGATION ============ */
.nav-wrap{
  position: fixed; top:0; left:0; right:0; z-index: 500;
  padding: 18px 0;
  transition: padding .35s var(--ease), background .35s var(--ease), box-shadow .35s var(--ease);
}
.nav-wrap::before{
  content:''; position:absolute; inset:0;
  background: rgba(11,13,15,0.0);
  backdrop-filter: blur(0px);
  transition: background .35s var(--ease), backdrop-filter .35s var(--ease);
  z-index:-1;
}
.nav-wrap.scrolled{ padding: 12px 0; box-shadow: 0 10px 30px -15px rgba(0,0,0,.6); }
.nav-wrap.scrolled::before{ background: rgba(11,13,15,0.82); backdrop-filter: blur(14px); }
.nav-wrap.scrolled{ border-bottom: 1px solid var(--panel-border); }

.nav{ display:flex; align-items:center; justify-content: space-between; gap: 20px; }
.brand{ display:flex; align-items:center; gap: 10px; color: var(--paper); }
.brand-mark{ color: var(--gold); display:flex; }
.brand-text{ font-family: var(--font-display); font-weight: 600; font-size: 1.25rem; letter-spacing: .02em; }
.brand-text-thin{ font-weight: 300; color: var(--grey); margin-left: 4px; }

.nav-menu{ display:flex; align-items:center; gap: 36px; }
.nav-links{ display:flex; align-items:center; gap: 30px; }
.nav-link{
  font-size: .92rem; font-weight: 600; color: var(--paper); opacity: .82;
  position: relative; padding: 4px 0;
  transition: opacity .25s var(--ease);
}
.nav-link::after{
  content:''; position:absolute; left:0; bottom:-2px; width:0; height:2px;
  background: var(--gold); transition: width .3s var(--ease);
}
.nav-link:hover{ opacity:1; }
.nav-link:hover::after{ width: 100%; }

.nav-toggle{ display:none; flex-direction:column; justify-content:center; gap:5px; width:30px; height:30px; background:none; border:none; padding:0; z-index: 20; }
.nav-toggle span{ width:100%; height:2px; background: var(--paper); border-radius:2px; transition: transform .3s var(--ease), opacity .3s var(--ease); }
.nav-toggle[aria-expanded="true"] span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
.nav-toggle[aria-expanded="true"] span:nth-child(2){ opacity:0; }
.nav-toggle[aria-expanded="true"] span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

/* ============ HERO ============ */
.hero{
  position: relative;
  min-height: 100vh;
  display:flex; align-items:center;
  padding: 140px 0 100px;
  overflow:hidden;
  isolation: isolate;
}
.hero-bg{ position:absolute; inset:0; z-index:-1; }
.hero-skyline{
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(232,162,61,0.10), transparent 60%),
    linear-gradient(180deg, #0d0f12 0%, #0B0D0F 45%, #0a0b0d 100%);
}
.hero-skyline::before{
  /* abstract roofline silhouette built from CSS gradients/clip-paths */
  content:'';
  position:absolute; left:0; right:0; bottom:0; height: 46%;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,.55) 70%);
  clip-path: polygon(
    0% 100%, 0% 62%, 6% 62%, 10% 40%, 16% 58%, 22% 58%, 26% 34%, 30% 58%,
    38% 58%, 42% 22%, 48% 58%, 56% 58%, 60% 46%, 66% 58%, 72% 58%, 76% 30%,
    82% 58%, 90% 58%, 94% 48%, 100% 58%, 100% 100%
  );
  background-color: #07080a;
  opacity: .9;
}
.hero-grain{
  position:absolute; inset:0; opacity:.5; mix-blend-mode: overlay;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.18) 1px, transparent 0);
  background-size: 3px 3px;
}
.hero-vignette{
  position:absolute; inset:0;
  background: radial-gradient(ellipse 80% 60% at 50% 30%, transparent 40%, rgba(0,0,0,.5) 100%);
}

.hero-inner{ position: relative; z-index: 2; max-width: 760px; }
.hero-title{
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2.6rem, 6.4vw, 4.8rem);
  line-height: 1.05;
  letter-spacing: -0.015em;
  color: var(--paper);
  margin-bottom: 26px;
}
.hero-sub{
  font-size: clamp(1.02rem, 1.4vw, 1.18rem);
  color: var(--grey);
  max-width: 560px;
  margin-bottom: 38px;
}
.hero-ctas{ display:flex; flex-wrap:wrap; gap: 16px; margin-bottom: 48px; }

.hero-trust{
  display:flex; flex-wrap: wrap; align-items:center; gap: 18px;
  padding: 18px 22px;
  background: rgba(21,24,28,0.55);
  border: 1px solid var(--panel-border);
  border-radius: 16px;
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  max-width: fit-content;
}
.trust-item{ display:flex; align-items:center; gap:8px; font-size:.86rem; font-weight:600; color: var(--paper); white-space:nowrap; }
.trust-item svg{ color: var(--gold); flex-shrink:0; }
.stars{ color: var(--gold); letter-spacing:1px; font-size: .85rem; }
.trust-sep{ width:1px; height:18px; background: var(--panel-border); }

.scroll-cue{
  position:absolute; left:50%; bottom:32px; transform: translateX(-50%);
  width: 26px; height: 42px; border: 1.5px solid rgba(245,243,239,.35); border-radius: 20px;
  display:flex; justify-content:center; padding-top:8px; z-index:2;
}
.scroll-cue span{ width:4px; height:8px; background: var(--gold); border-radius: 3px; animation: scrollPulse 1.8s ease-in-out infinite; }
@keyframes scrollPulse{ 0%,100%{ transform: translateY(0); opacity:1;} 50%{ transform: translateY(10px); opacity:0;} }
@media (prefers-reduced-motion: reduce){ .scroll-cue span{ animation:none; } }

/* ============ SEAM DIVIDER (signature motif) ============
   A thin repeating diagonal "shingle course" seam used between sections. */
.seam-divider{
  position: relative; height: 26px;
  background-image: repeating-linear-gradient(
    115deg,
    var(--panel-border) 0 1px,
    transparent 1px 64px
  );
  background-color: transparent;
}
.seam-divider::after{
  content:''; position:absolute; left:0; right:0; top:50%;
  height:1px; background: linear-gradient(90deg, transparent, var(--bronze) 20%, var(--gold-deep) 50%, var(--bronze) 80%, transparent);
  opacity:.55;
}
.seam-divider--hero{ position:absolute; left:0; right:0; bottom:0; height:30px; z-index:3; }

/* ============ SERVICES ============ */
.section{ position: relative; padding: 110px 0; }
.services{ background: var(--ink); }
.services-grid{
  display:grid; grid-template-columns: repeat(3, 1fr); gap: 26px;
}
.service-card{
  position: relative;
  background: linear-gradient(160deg, var(--panel-2), var(--panel));
  border: 1px solid var(--panel-border);
  padding: 38px 32px 30px;
  border-radius: var(--radius);
  /* corner-notch: signature clipped tab, echoes a cut shingle corner */
  clip-path: polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 0 100%);
  transition: transform .45s var(--ease), border-color .35s var(--ease), background .35s var(--ease);
}
.service-card::before{
  content:''; position:absolute; top:0; right:0; width:26px; height:26px;
  background: linear-gradient(135deg, transparent 49%, var(--gold-deep) 50%);
  opacity:.55;
}
.service-card:hover{
  transform: translateY(-8px);
  border-color: rgba(232,162,61,0.4);
  background: linear-gradient(160deg, #20242a, var(--panel-2));
}
.service-card--accent{
  background: linear-gradient(160deg, #241a0e, #1c150c);
  border-color: rgba(232,162,61,0.3);
}
.service-icon{
  width: 60px; height: 60px; border-radius: 12px;
  display:flex; align-items:center; justify-content:center;
  background: rgba(232,162,61,0.1); color: var(--gold);
  margin-bottom: 24px;
}
.service-card h3{ font-family: var(--font-display); font-weight:600; font-size:1.3rem; color: var(--paper); margin-bottom:12px; }
.service-card p{ color: var(--grey); font-size: .96rem; line-height:1.7; margin-bottom: 22px; }
.service-link{
  display:inline-flex; align-items:center; gap:7px;
  font-size: .88rem; font-weight:700; color: var(--gold);
  border-bottom: 1px solid transparent;
}
.service-link svg{ transition: transform .3s var(--ease); }
.service-card:hover .service-link svg{ transform: translateX(4px); }

/* ============ WHY CHOOSE US ============ */
.why{ background: var(--paper); }
.why-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: rgba(11,13,15,0.08); border-radius: var(--radius); overflow:hidden; }
.why-item{
  background: var(--paper); padding: 40px 34px;
  transition: background .35s var(--ease);
}
.why-item:hover{ background: #ECE8DF; }
.why-item svg{ color: var(--gold-deep); margin-bottom: 18px; }
.why-item h3{ font-family: var(--font-display); font-weight:600; font-size: 1.16rem; color: var(--ink); margin-bottom:10px; }
.why-item p{ color: var(--grey-dim); font-size: .94rem; line-height:1.65; }

/* ============ STATS ============ */
.stats{
  background: linear-gradient(135deg, #161208, var(--ink) 60%);
  border-top: 1px solid var(--panel-border);
  border-bottom: 1px solid var(--panel-border);
  padding: 64px 0;
}
.stats-grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 30px; text-align:center; }
.stat-num{
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(2.2rem, 4vw, 3.1rem);
  background: linear-gradient(135deg, var(--gold-soft), var(--gold-deep));
  -webkit-background-clip: text; background-clip:text; color: transparent;
  margin-bottom: 6px;
}
.stat-item p{ color: var(--grey); font-size: .9rem; letter-spacing:.04em; text-transform: uppercase; font-weight:600; }

/* ============ ABOUT ============ */
.about{ background: var(--ink); }
.about-grid{ display:grid; grid-template-columns: 0.85fr 1.15fr; gap: 70px; align-items:center; }
.about-visual{ position:relative; }
.about-frame{
  position:relative; aspect-ratio: 4/5; border-radius: var(--radius);
  overflow:hidden;
  background:
    radial-gradient(circle at 30% 20%, rgba(232,162,61,.25), transparent 55%),
    linear-gradient(160deg, #23272c, #111417 70%);
  border: 1px solid var(--panel-border);
  box-shadow: var(--shadow-lift);
}
.about-roofline{
  position:absolute; left:0; right:0; bottom:0; top: 38%;
  background-color: #0c0e10;
  clip-path: polygon(0% 30%, 16% 30%, 24% 0%, 32% 30%, 48% 30%, 58% 8%, 68% 30%, 84% 30%, 92% 14%, 100% 30%, 100% 100%, 0% 100%);
}
.about-roofline::after{
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(115deg, rgba(232,162,61,0.07) 0 1px, transparent 1px 22px);
}
.about-badge{
  position:absolute; bottom: 24px; left: 24px; right: 24px;
  background: rgba(21,24,28,0.65);
  border: 1px solid var(--panel-border);
  backdrop-filter: blur(14px);
  border-radius: 12px;
  padding: 18px 22px;
  display:flex; align-items:baseline; gap: 12px;
}
.about-badge-num{ font-family: var(--font-display); font-weight:700; font-size: 1.8rem; color: var(--gold); }
.about-badge-label{ font-size: .85rem; color: var(--paper); font-weight:600; }
.about-copy p{ color: var(--grey); margin-bottom: 20px; max-width: 560px; }
.about-points{ display:flex; flex-direction:column; gap: 14px; margin-top: 28px; }
.about-points div{ display:flex; align-items:center; gap:10px; font-weight:600; font-size:.95rem; color: var(--paper); }
.about-points svg{ color: var(--gold); flex-shrink:0; }

.about-values{ margin-top: 90px; }
.about-values-head{ max-width: 640px; margin: 0 auto 48px; text-align:center; }
.about-values-head h3{
  font-family: var(--font-display); font-weight:600; font-size: clamp(1.4rem, 2.4vw, 1.9rem);
  color: var(--paper); line-height:1.35; margin-top: 8px;
}
.values-grid{ display:grid; grid-template-columns: repeat(4, 1
